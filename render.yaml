services:
  - type: web
    name: neuroweave-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://neuroweave.in","https://www.neuroweave.in"]'
      - key: ENVIRONMENT
        value: production
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
